<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Drill 1</title>
    <style>
        body {
            background-image:url(https://t3.ftcdn.net/jpg/03/55/60/70/360_F_355607062_zYMS8jaz4SfoykpWz5oViRVKL32IabTP.jpg);
            background-size: cover;
            background-size: 150%, 100%;
            background-position: center;
            background-repeat: no-repeat;
            font-family: Noto Sans, sans-serif;
        }
        .container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            max-width: 1140px;
            margin: 0 auto;
        }
        .card {
            background-color: white;
            border-radius: 10px;
            padding: 80px 20px;
            color: #100939;
            box-shadow: 0 6px 8px rgba(0, 0, 0, 0.15);
            text-align: center;
        }
        .card h3 {
            margin-top: 0;
            margin-bottom: 10px;
            font-size: 1.5rem;
        }
        .card p {
            margin: 0;
            font-size: 1rem;
        }
    </style>
</head>
<body><br><br><br><br>
    <div class="container">
        <div class="card">
            <h3>Values Education</h3>
            <p>9-Diamond 6769</p>
        </div>
        <div class="card">
            <h3>English</h3>
            <p>9-Diamond 6769</p>
        </div>
        <div class="card">
            <h3>ICT</h3>
            <p>9-Diamond 6769</p>
        </div>
        <div class="card">
            <h3>Filipino</h3>
            <p>9-Diamond 6769</p>
        </div>
        <div class="card">
            <h3>Mathematics</h3>
            <p>9-Diamond 6769</p>
        </div>
        <div class="card">
            <h3>TLE</h3>
            <p>9-Diamond 6769</p>
        </div>
    </div>
    <script src="main.js"></script>
</body>
